{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-xl border border-red-100 mt-6 text-center">
    
    <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl font-bold">
        !
    </div>

    <h1 class="text-2xl font-bold text-slate-800 mb-6">{{ titulo_form }}</h1>
    
    <form method="POST" class="flex gap-4">
        {% csrf_token %}
        
        <a href="{% url 'list_cocheras' %}" class="w-1/2 bg-zinc-200 hover:bg-zinc-300 text-slate-700 font-bold py-3 rounded-xl transition-colors block text-center">
            Cancelar
        </a>
        
        <button type="submit" class="w-1/2 bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl shadow-md shadow-red-200 transition-colors cursor-pointer">
            Si, Eliminar
        </button>
    </form>
</div>
{% endblock %}
